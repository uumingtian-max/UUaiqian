# 宿主机 Nginx：仅 8001 SSL（外网 NAT 61931 → 本机 8001）。不绑定 443，适合「只能映射两端口」场景。
# 使用：https://aquan.xin:61931（整站含 /v1 /health /kb /deploy，与页面同源）
#
upstream sihan_frontend {
    server 127.0.0.1:18001;
}

server {
    listen 8001 ssl;
    server_name aquan.xin www.aquan.xin;

    ssl_certificate     /etc/nginx/ssl/aquan.xin.crt;
    ssl_certificate_key /etc/nginx/ssl/aquan.xin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    client_max_body_size 64m;

    location / {
        proxy_pass http://sihan_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
