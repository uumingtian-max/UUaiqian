<script>
const API = 'http://175.155.64.171:61930';

/** 网关伴读与长期记忆分区（与 companion_brain 一致） */

function apiHeadersJson() {

const VOICE = 'alipay_lingguang';
const CHAR_BG = "url('https://i.imgur.com/8vK9L2P.jpeg')";

const LS_INTERACTION = 'sihan_interaction_mode';
const LS_LAYOUT = 'sihan_layout_mode';
const LS_AVATAR_3D = 'sihan_avatar_3d';

/** text = 小涵回复也显示在气泡里；voice = 只播语音，不显示她的正文（仍可向模型要内容用于 TTS） */
let interactionMode = localStorage.getItem(LS_INTERACTION) || 'text';

let layoutMode = localStorage.getItem(LS_LAYOUT) || 'normal';

/** true = Three.js 层在前；false = 2D 立绘背景 */
let useAvatar3D = localStorage.getItem(LS_AVATAR_3D) === '1';

function syncAvatarChip() {

function applyAvatar3DClass() {

async function ensureAvatar3DScene() {
  if (window.initSihanAvatar3D) {
    await window.initSihanAvatar3D();
    return;
  }
  await import('./avatar3d.js');
  if (window.initSihanAvatar3D) await window.initSihanAvatar3D();
}

async function setUseAvatar3D(on) {
  useAvatar3D = !!on;
  localStorage.setItem(LS_AVATAR_3D, useAvatar3D ? '1' : '0');
  applyAvatar3DClass();
  if (useAvatar3D) await ensureAvatar3DScene();
}

/** 从用户话里驱动 3D：换装 / 动作 / morph（需模型支持） */
function applyAvatarCommandsFromUser(text) {
  const t = text || '';
  const VA = window.VirtualAvatar;
  if (!useAvatar3D || !VA) return;

  /** 换装 3=全套 2=无外衣 1=仅身体 0=裸体（与 avatar3d.js 一致 */

  const sm = t.match(/微笑[:：]?\s*([0-9.]+)/);

    try { VA.setExpression({ mouthSmile: parseFloat(sm[1]) }); } catch (e) {}

}

function inferMoodFromText(text) {
  const t = text || '';
  if (/害羞|脸红|别这样|不好意思|人家/.test(t)) return 'shy';
  if (/坏笑|哼|调皮|逗你/.test(t)) return 'tease';
  if (/开心|太好|嘻嘻|哈哈|真好/.test(t)) return 'happy';
  if (/想想|嗯…|怎么说呢|让我想想/.test(t)) return 'think';
  return '';
}

function setMoodClass(mood) {
  const el = document.getElementById('charMood');
  if (!el) return;
  el.className = 'char-mood' + (mood ? ' ' + mood : '');
  el.classList.toggle('active', !!mood);
}

function setMoodFromAssistantText(text) {
  const m = inferMoodFromText(text);
  setMoodClass(m);
}

function clearSpeakingSync() {
  if (moodAnim) cancelAnimationFrame(moodAnim);
  moodAnim = null;
  document.body.classList.remove('speaking');
}

function attachAudioMoodSync(audio) {
  const el = document.getElementById('charMood');
  if (!el || !lastReplyRaw) return;
  const baseMood = inferMoodFromText(lastReplyRaw) || 'think';
  setMoodClass(baseMood);
  el.classList.add('active');
  const strip = lastReplyRaw
    .replace(/（[^）]*）/g, '')
    .replace(/\[[^\]]*\]/g, '')
    .replace(/【[^】]*】/g, '');
  const seg = (strip.match(/[^。！？…]+[。！？…]?/g) || [strip]).filter(Boolean);
  let total = Math.max(audio.duration || 0, 0.001);

  function tick() {
    if (!audio || audio.paused || audio.ended) {
      clearSpeakingSync();
      setMoodFromAssistantText(lastReplyRaw);
      return;
    }
    document.body.classList.add('speaking');
    const d = audio.duration;
    if (d && !Number.isNaN(d)) total = Math.max(d, 0.001);
    const t = audio.currentTime;
    const ratio = t / total;
    const idx = Math.min(seg.length - 1, Math.max(0, Math.floor(ratio * seg.length)));
    const sub = inferMoodFromText(seg[idx]) || baseMood;
    el.className = 'char-mood active ' + sub;
    moodAnim = requestAnimationFrame(tick);
  }
  function startTick() {
    total = Math.max(audio.duration || 0.001, 0.001);
    if (moodAnim) cancelAnimationFrame(moodAnim);
    moodAnim = requestAnimationFrame(tick);
  }
  function onPlay3d() {
    if (useAvatar3D && window.VirtualAvatar) {
      try { window.VirtualAvatar.playPose('talking'); } catch (e) {}
    }
    startTick();
  }
  audio.addEventListener('loadedmetadata', startTick, { once: true });
  audio.addEventListener('play', onPlay3d, { once: false });
  audio.addEventListener('ended', () => {
    clearSpeakingSync();
    setMoodFromAssistantText(lastReplyRaw);
    if (useAvatar3D && window.VirtualAvatar) {
      try { window.VirtualAvatar.playPose('idle'); } catch (e) {}
    }
  });
  audio.addEventListener('pause', () => {
    if (audio.duration && audio.currentTime >= audio.duration - 0.05) return;
    document.body.classList.remove('speaking');
    if (useAvatar3D && window.VirtualAvatar) {
      try { window.VirtualAvatar.playPose('idle'); } catch (e) {}
    }
  });
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = reject;
    fr.readAsDataURL(file);
  });
}

function downscaleDataUrl(dataUrl, maxSide = 1024, quality = 0.82) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if (!w || !h || (w <= maxSide && h <= maxSide)) return resolve(dataUrl);
      if (w > h) { h = Math.round((h * maxSide) / w); w = maxSide; }
      else { w = Math.round((w * maxSide) / h); h = maxSide; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      try { resolve(c.toDataURL('image/jpeg', quality)); } catch (e) { resolve(dataUrl); }
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function buildUserContent(text) {
  const raw = (text || '').trim();
  if (!pendingMedia) return raw || '（无文字）';
  let dataUrl = await fileToDataURL(pendingMedia);
  dataUrl = await downscaleDataUrl(dataUrl, 1024, 0.82);
  pendingMedia = null;
  document.getElementById('fileName').textContent = '未选择';
  try { document.getElementById('mediaFile').value = ''; } catch (e) {}
  const userText = raw || '请看看这张图，用自然口吻说说你看到了什么。';
  return [{ type: 'text', text: userText }, { type: 'image_url', image_url: { url: dataUrl } }];
}

function stripStageDirectionsForTTS(text) {
  if (!text) return '';
  let s = text.replace(/（[^）]*）/g, '');
  s = s.replace(/\[[^\]]*\]/g, '');
  s = s.replace(/【[^】]*】/g, '');
  s = s.replace(/\([^)]{0,80}\)/g, '');
  s = s.replace(/\n+/g, ' ').replace(/\s{2,}/g, ' ').trim();
  return s || text;
}

function humanizeText(text) {
  let t = (text || '').trim();
  // 轻声、拖音处给 TTS 一点空格，便于按句合成时的自然停顿
  t = t.replace(/(嗯+|诶|诶呀|好啦|别闹|好啦好啦)(?=[^\s，。！？])/g, '$1… ');
  if (t.length > 22 && !/[，。！？；、…]/.test(t)) t = t.replace(/(.{14})/g, '$1，');
  t = t.replace(/([，、；])/g, '$1 ');
  t = t.replace(/([。！？])/g, '$1  ');
  t = t.replace(/…/g, '… ');
  return t;
}

/** 全局基线 prosody；服务端仍会对每句再微调（dynamic_prosody） */
function computeProsody(reply) {
  const s = reply || '';
  const len = s.length;
  const punct = (s.match(/[，。！？、；…]/g) || []).length;
  const punctDensity = len > 0 ? punct / len : 0;
  const hasEmotion = /爱|想|抱|心疼|害羞|委屈|喜欢|难过|开心|哼|嘻|嘛|呀|呐/.test(s);
  const shy = /害羞|脸红|别这样|小声|轻轻|不敢/.test(s);
  const exciting = /！[^(]*$/.test(s.trim()) || /太好|真的吗|哇/.test(s);

  let rate = 0;
  let pitch = -1;
  let volume = 2;

  if (len < 12) rate += 8;
  else if (len > 95) rate -= 14;
  else if (len > 55) rate -= 7;

  rate -= Math.min(10, Math.round(punctDensity * 42));
  if (/[？?]/.test(s)) {
    pitch += 4;
    rate -= 3;
  }
  if (exciting) {
    pitch += 3;
    volume += 2;
    rate += 2;
  }
  if (hasEmotion) {
    rate -= 6;
    pitch += 2;
    volume += 3;
  }
  if (shy) {
    rate -= 8;
    pitch += 1;
    volume -= 2;
  }
  rate += (Math.random() * 6 - 3) | 0;

  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  return {
    rate: `${rate >= 0 ? '+' : ''}${clamp(rate, -22, 18)}%`,
    pitch: `${(pitch >= 0 ? '+' : '') + clamp(pitch, -8, 12)}Hz`,
    volume: `${(volume >= 0 ? '+' : '') + clamp(volume, -8, 10)}%`,
  };
}

function stripHtmlForPreview(raw) {
  if (!raw) return '';
  return raw
    .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
    .replace(/\son\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi, '');
}

function extractHtmlBlock(text) {
  const m = text.match(/```html\s*([\s\S]*?)```/i);
  return m ? m[1].trim() : '';
}

function renderStudio(reply) {
  const plainEl = document.getElementById('studioPlain');
  const frame = document.getElementById('previewFrame');
  if (layoutMode !== 'code') {
    plainEl.textContent = '';
    try { frame.srcdoc = ''; } catch (e) {}
    return;
  }
  const html = extractHtmlBlock(reply);
  const rest = html ? reply.replace(/```html\s*[\s\S]*?```/i, '').trim() : reply;
  plainEl.textContent = rest || '（这里没有额外说明）';
  if (html) {
    try {
      frame.srcdoc = stripHtmlForPreview(html);
    } catch (e) {
      frame.srcdoc = '<p style="padding:12px;color:#333">预览加载失败，请看下方文字。</p>';
    }
  } else {
    frame.srcdoc = '<p style="padding:16px;font-family:sans-serif;color:#555">这次没有带可预览的小页面，你先看左边她的说明；需要预览时让她「给一段 html 放进代码块」。</p>';
  }
}

async function playBlob(blob) {
  const audio = document.getElementById('audioPlayer');
  clearSpeakingSync();
  if (lastAudioUrl) URL.revokeObjectURL(lastAudioUrl);
  lastAudioUrl = URL.createObjectURL(blob);
  audio.src = lastAudioUrl;
  attachAudioMoodSync(audio);
  try { await audio.play(); return true; } catch (e) { return false; }
}

function escapeHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendInteraction(e) {
  if (e) e.preventDefault();
  if (sending) return;

  const input = document.getElementById('userText');
  let text = (input.value || '').trim();
  if (!text && !pendingMedia) text = '在吗？';

  applyCommandsFromUser(text);

  sending = true;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '…';

  const userMsgPreview = pendingMedia ? (text ? `${text}（图）` : '（图）') : text;

  if (interactionMode === 'voice') {
    setReply(`你：${escapeHtml(userMsgPreview)}`);
  } else {
    setReply(`你：${userMsgPreview}<br><br>小涵：嗯…`);
  }

  try {
    const userContent = await buildUserContent(text);
    conversationHistory.push({ role: 'user', content: userContent });
    if (conversationHistory.length > 14) conversationHistory.splice(0, conversationHistory.length - 14);

    const messages = [
      { role: 'system', content: buildSystemPrompt() },
      ...conversationHistory,
    ];

    const chatRes = await fetch(`${API}/v1/chat/completions`, {
      method: 'POST',
      headers: apiHeadersJson(),
      body: JSON.stringify({
        model: MODEL,
        messages,
        max_tokens: layoutMode === 'code' ? 900 : 280,
        temperature: 0.92,
        top_p: 0.9,
        presence_penalty: 0.4,
        frequency_penalty: 0.32,
      }),
    });

    const data = await chatRes.json();
    let reply = (data?.choices?.[0]?.message?.content || '喂…我在呢。').trim();
    lastReplyRaw = reply;
    setMoodFromAssistantText(reply);

    conversationHistory.push({ role: 'assistant', content: reply });

    const uIdx = conversationHistory.length - 2;
    if (uIdx >= 0 && Array.isArray(conversationHistory[uIdx].content)) {
      const parts = conversationHistory[uIdx].content;
      const t = parts.find((x) => x.type === 'text')?.text || '';
      conversationHistory[uIdx].content = t
        ? `${t}（刚发过一张图。）`
        : '（刚发过一张图。）';
    }

    renderStudio(reply);

    if (interactionMode === 'voice') {
      setReply(`你：${escapeHtml(userMsgPreview)}`);
    } else {
      const safe = reply.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
      setReply(`你：${userMsgPreview}<br><br><strong>小涵：</strong><br>${safe}`);
    }

    let ttsIn = humanizeText(stripStageDirectionsForTTS(reply));
    if (ttsIn.length > 2800) ttsIn = ttsIn.slice(0, 2800);
    const prosody = computeProsody(reply);

    const ttsRes = await fetch(`${API}/v1/audio/speech`, {
      method: 'POST',
      headers: apiHeadersJson(),
      body: JSON.stringify({
        input: ttsIn.slice(0, 2800),
        voice: VOICE,
        rate: prosody.rate,
        pitch: prosody.pitch,
        volume: prosody.volume,
        dynamic_prosody: true,
      }),
    });

    if (ttsRes.ok) {
      const blob = await ttsRes.blob();
      await playBlob(blob);
    }
  } catch (err) {
    if (interactionMode === 'voice') {
      setReply(`你：${escapeHtml(userMsgPreview)}`);
    } else {
      setReply(`你：${userMsgPreview}<br><br>小涵：这边有点卡，你再发一次嘛…`);
    }
  } finally {
    sending = false;
    btn.disabled = false;
    btn.textContent = '发送';
    input.value = '';
  }
}

function pickMedia() {
  document.getElementById('mediaFile').click();
}

document.getElementById('mediaFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  pendingMedia = file;
  document.getElementById('fileName').textContent =
    file.name.length > 16 ? file.name.slice(0, 14) + '…' : file.name;
});

document.getElementById('userText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    sendInteraction(e);
  }
});

applyAvatar3DClass();
(() => {
  const chip = document.getElementById('avatarModeChip');
  if (!chip) return;
  const toggle = () => {
    setUseAvatar3D(!useAvatar3D);
  };
  chip.addEventListener('click', toggle);
  chip.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggle();
    }
  });
})();
if (useAvatar3D) {
  ensureAvatar3DScene().catch(() => {});
}

applyLayout();
</script>
